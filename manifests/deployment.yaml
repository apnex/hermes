apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  namespace: hermes
  labels:
    app: hermes
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: hermes
  template:
    metadata:
      labels:
        app: hermes
    spec:
      # cluster-admin SA — kubectl in pod auto-detects in-cluster config
      # via the auto-mounted token at /var/run/secrets/kubernetes.io/...
      serviceAccountName: hermes-admin
      # Run as root (UID 0) so the pod can author commits directly in repos
      # mounted from the host /root at /host. The pod is already a privileged
      # peer (cluster-admin kubectl, host SSH key, GitHub PAT) — UID 10000
      # added no real boundary while blocking in-pod GitOps authoring.
      # (Previously: fsGroup 10000 / OnRootMismatch for Secret-mounted SSH key
      # readability — moot now that the container runs as root.)
      securityContext:
        runAsUser: 0
        runAsGroup: 0
      initContainers:
        - name: seed-config
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              # Always regenerate config.yaml AND honcho.json from templates
              # + Secret values. The Git templates are the source of truth
              # for this deployment; runtime mutations to either file are
              # not persisted across pod restarts.
              sed -e "s|@LITELLM_BASE_URL@|${LITELLM_BASE_URL}|g" \
                  -e "s|@LITELLM_MODEL@|${LITELLM_MODEL}|g" \
                  -e "s#@LITELLM_API_KEY@#${LITELLM_API_KEY}#g" \
                  /seed/config.yaml.tpl > /opt/data/config.yaml
              echo "wrote /opt/data/config.yaml"

              # honcho.json — Honcho plugin's native config. Owned by the
              # plugin (NOT hermes-core). HERMES_PEER_NAME defaults to
              # 'default-user' if unset, so a fresh deploy without the
              # Secret key still produces a valid file.
              sed -e "s|@HERMES_PEER_NAME@|${HERMES_PEER_NAME:-default-user}|g" \
                  /seed/honcho.json.tpl > /opt/data/honcho.json
              echo "wrote /opt/data/honcho.json (peerName=${HERMES_PEER_NAME:-default-user})"

              # Lock config.yaml to read-only as defense-in-depth. The primary
              # guarantee is HERMES_MANAGED=k3s on the main container, which makes
              # hermes-core's save_config/set_config_value/etc. no-op cleanly
              # (see hermes_cli/config.py::is_managed). 0444 root:root is the
              # backstop: even if something bypasses is_managed(), the kernel
              # refuses the write. The file MUST be world-readable because the
              # gateway worker runs as uid 10000 (hermes), not root.
              chown root:root /opt/data/config.yaml
              chmod 0444      /opt/data/config.yaml
              # honcho.json stays writable by the hermes user — the Honcho plugin
              # legitimately persists peer metadata at runtime.
              chown 10000:10000 /opt/data/honcho.json
              chmod 0640        /opt/data/honcho.json
              echo "normalized: config.yaml=0444 root:root (RO), honcho.json=0640 hermes:hermes"
          env:
            # Config (non-sensitive) — sourced from the hermes-config ConfigMap.
            - name: LITELLM_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: hermes-config
                  key: LITELLM_BASE_URL
            - name: LITELLM_MODEL
              valueFrom:
                configMapKeyRef:
                  name: hermes-config
                  key: LITELLM_MODEL
            # Credentials (sensitive) — sourced from the hermes-credentials Secret.
            - name: LITELLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-credentials
                  key: LITELLM_API_KEY
            # Honcho peer identity. Optional ConfigMap key — fresh deployers
            # who haven't set this get peerName="default-user" in honcho.json,
            # which is a valid (if generic) starting point.
            - name: HERMES_PEER_NAME
              valueFrom:
                configMapKeyRef:
                  name: hermes-config
                  key: HERMES_PEER_NAME
                  optional: true
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: config-tpl
              mountPath: /seed
        # skill-sync — agent-agnostic GitOps skill loader.
        # Clones a SKILL.md-tree repo (e.g. apnex/mission-kit), resolves
        # the wanted-bundles manifest into a concrete skill list, and
        # writes the filtered subset to /opt/data/extra-skills/.
        # Hermes reads from there via skills.external_dirs in config.yaml.
        #
        # Best-effort: missing skills are logged and skipped; only a total
        # resolution failure (zero skills found) blocks pod start. If the
        # source repo is unreachable, the previous /opt/data/extra-skills/
        # snapshot is left in place (no rewrite happens before the clone
        # succeeds), so transient github outages don't kill the pod.
        - name: skill-sync
          image: alpine/git:2.45.2
          command:
            - /bin/sh
            - /seed-skill-sync/skill-sync.sh
          env:
            - name: SKILL_SYNC_REPO
              value: "https://github.com/apnex/mission-kit.git"
            - name: SKILL_SYNC_REF
              value: "main"
            - name: SKILL_SYNC_MANIFEST
              value: "/seed-skill-sync/wanted-bundles.yaml"
            - name: SKILL_SYNC_TARGET
              value: "/opt/data/extra-skills"
            - name: SKILL_SYNC_OWNER
              value: "10000:10000"
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: skill-sync-tpl
              mountPath: /seed-skill-sync
        # plugin-sync — GitOps Hermes plugin loader.
        # Clones a Hermes plugin repo (e.g. apnex/hermes-plugins),
        # resolves the wanted-plugins manifest into a concrete plugin
        # list, and writes the filtered subset to /opt/data/plugins/.
        # Hermes's memory plugin loader then auto-discovers plugins
        # from $HERMES_HOME/plugins/<name>/ at startup.
        #
        # Pinned to v1.0.1 (not main) for production-grade reproducibility.
        # Bump PLUGINS_REF here in Git when a new plugin release ships.
        #
        # Best-effort: missing plugins are logged and skipped; only a
        # total resolution failure (zero plugins found) blocks pod start.
        # If the source repo is unreachable, the previous
        # /opt/data/plugins/ snapshot is left in place (no rewrite before
        # clone succeeds), so transient github outages don't kill the pod.
        - name: plugin-sync
          image: alpine/git:2.45.2
          command:
            - /bin/sh
            - /seed-plugin-sync/plugin-sync.sh
          env:
            - name: PLUGINS_REPO
              value: "https://github.com/apnex/hermes-plugins.git"
            - name: PLUGINS_REF
              value: "v1.0.1"
            - name: PLUGINS_MANIFEST
              value: "/seed-plugin-sync/wanted-plugins.yaml"
            - name: PLUGINS_TARGET
              value: "/opt/data/plugins"
            - name: PLUGINS_OWNER
              value: "10000:10000"
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: plugin-sync-tpl
              mountPath: /seed-plugin-sync
        # stage-ssh-key — copy the host SSH key from its projected volume
        # (which fsGroup relaxes to 0440 — OpenSSH refuses) into an emptyDir
        # with explicit 0400 perms + hermes:hermes ownership. The emptyDir's
        # root dir is then group-owned by hermes, so fsGroup's OnRootMismatch
        # policy skips re-chmoding it on main-container start.
        #
        # If the Secret doesn't exist (host-access opt-in not done yet), the
        # source file is absent and we just create an empty staging dir —
        # `ssh-target` will fail at runtime but pod boots fine.
        - name: stage-ssh-key
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              set -e
              # Main container runs as UID 0 (see pod securityContext); stage
              # the host SSH key as root:root so OpenSSH accepts the 0400 mode.
              chown 0:0 /stage
              chmod 0700 /stage
              if [ -f /seed-ssh/id_ed25519 ]; then
                install -m 0400 -o 0 -g 0 \
                  /seed-ssh/id_ed25519 /stage/id_ed25519
                echo "staged host SSH key at /stage/id_ed25519 (0400 root:root)"
              else
                echo "no SSH key in Secret — ssh-target wrapper will be inert"
              fi
          volumeMounts:
            - name: ssh-target-key-src
              mountPath: /seed-ssh
              readOnly: true
            - name: ssh-target-key-staged
              mountPath: /stage
      containers:
        - name: hermes
          image: australia-southeast1-docker.pkg.dev/labops-389703/kate/hermes-agent:v2026.5.16-voice-2
          imagePullPolicy: IfNotPresent
          args: ["gateway", "run"]
          ports:
            - containerPort: 8642
              name: api
            - containerPort: 9119
              name: dashboard
          env:
            - name: API_SERVER_ENABLED
              value: "true"
            - name: API_SERVER_HOST
              value: "0.0.0.0"
            - name: HERMES_DASHBOARD
              value: "1"
            - name: API_SERVER_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-credentials
                  key: API_SERVER_KEY
            # GitHub auth — mirrors the host's gh auth, enabling `gh` CLI calls
            # and authenticated git push from inside the pod. Sourced from
            # hermes-credentials via ./set-secret; pod starts cleanly without it
            # (git operations against private repos will simply fail until
            # the token is supplied). `gh auth setup-git` runs at container
            # start (see image/Dockerfile) and wires git's credential helper
            # to use $GH_TOKEN automatically.
            - name: GH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hermes-credentials
                  key: GH_TOKEN
                  optional: true
            # Host shell — `ssh-target <cmd>` wrapper SSHes to the
            # configured host as the configured user, reading the SSH
            # key from the ssh-target-key Secret-mounted path.
            # All three vars are operator-supplied (per-env) via the
            # hermes-config ConfigMap. Absent → ssh-target wrapper uses
            # image-baked defaults (root@unset.invalid — fails loudly).
            - name: SSH_TARGET_USER
              valueFrom:
                configMapKeyRef:
                  name: hermes-config
                  key: SSH_TARGET_USER
                  optional: true
            - name: SSH_TARGET_HOST
              valueFrom:
                configMapKeyRef:
                  name: hermes-config
                  key: SSH_TARGET_HOST
                  optional: true
            - name: SSH_TARGET_KEY_PATH
              value: "/etc/ssh-target/id_ed25519"
            # Tell hermes-core it's running under external lifecycle management
            # (k3s + GitOps). All save_config / set_config_value / web-UI write
            # paths in hermes_cli/config.py gate on is_managed() and become a
            # friendly managed_error() no-op. Source of truth is
            # manifests/config.yaml.tpl + the seed-config initContainer; runtime
            # mutations would be wiped on next pod restart anyway, so refusing
            # them up-front is the honest contract. Defense-in-depth: the
            # rendered config.yaml is also chmod 0444 root:root.
            - name: HERMES_MANAGED
              value: "k3s"
          volumeMounts:
            - name: data
              mountPath: /opt/data
            # Host /root bind-mounted at /host (NOT /root) for namespace
            # clarity. Rationale: the in-pod root user's $HOME is /root and
            # the operator's host repos also live under /root on obpc.
            # Mounting at /root would collide the two and make every path
            # ambiguous ("is this pod-local or host-bind?"). Mounting at
            # /host makes the source explicit: /host/kate, /host/mission-kit,
            # /host/hermes-plugins, etc. are unambiguously the host's tree.
            # Translation rule for cross-side references: /host/<x> in pod
            # == /root/<x> on host.
            - name: host-root
              mountPath: /host
            # Bot's private SSH key. Staged into an emptyDir by the
            # stage-ssh-key initContainer with explicit 0400 perms so
            # OpenSSH accepts it (fsGroup would otherwise relax the
            # projected volume to 0440).
            - name: ssh-target-key-staged
              mountPath: /etc/ssh-target
              readOnly: true
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8642
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8642
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes-data
        - name: config-tpl
          configMap:
            name: hermes-templates
        # skill-sync — ConfigMap carrying the loader script + the
        # wanted-bundles manifest. Both are GitOps-managed in
        # manifests/skill-sync/; kustomize bundles them into the
        # 'hermes-skill-sync' ConfigMap (see kustomization.yaml).
        - name: skill-sync-tpl
          configMap:
            name: hermes-skill-sync
            defaultMode: 0555
        # plugin-sync — ConfigMap carrying the loader script + the
        # wanted-plugins manifest. Both are GitOps-managed in
        # manifests/plugin-sync/; kustomize bundles them into the
        # 'hermes-plugin-sync' ConfigMap (see kustomization.yaml).
        - name: plugin-sync-tpl
          configMap:
            name: hermes-plugin-sync
            defaultMode: 0555
        # Host /root bind-mount source. Mounted into the container at
        # /host (see container.volumeMounts for the rationale). Gives the
        # bot direct file r/w access to all the operator's projects under
        # /root on obpc. Single-node only.
        - name: host-root
          hostPath:
            path: /root
            type: Directory
        # SSH key for the `ssh-target` wrapper. Optional — pod boots
        # without it; ssh-target commands fail until the operator
        # provides SSH_TARGET_KEY via set-secret (which creates the
        # ssh-target-key Secret with the PEM under data key id_ed25519).
        #
        # Two-volume pattern: the projected `ssh-target-key-src` mounts
        # the raw Secret (subject to fsGroup, so it ends up 0440 —
        # unusable); the stage-ssh-key initContainer copies it into the
        # emptyDir `ssh-target-key-staged` with explicit 0400 perms that
        # survive fsGroup's OnRootMismatch policy. Main container mounts
        # the staged emptyDir, not the projected source.
        - name: ssh-target-key-src
          projected:
            defaultMode: 0400
            sources:
              - secret:
                  name: ssh-target-key
                  optional: true
                  items:
                    - key: id_ed25519
                      path: id_ed25519
                      mode: 0400
        - name: ssh-target-key-staged
          emptyDir:
            medium: Memory
