apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  namespace: hermes
  labels:
    app: hermes
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: hermes
  template:
    metadata:
      labels:
        app: hermes
    spec:
      # cluster-admin SA — kubectl in pod auto-detects in-cluster config
      # via the auto-mounted token at /var/run/secrets/kubernetes.io/...
      serviceAccountName: hermes-admin
      # fsGroup 10000 (= hermes gid) so Secret-mounted files (the SSH key)
      # are group-readable by the bot. OnRootMismatch avoids recursive chown
      # on every restart for the existing PVC contents.
      securityContext:
        fsGroup: 10000
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
        - name: seed-config
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              # Always regenerate config.yaml AND honcho.json from templates
              # + Secret values. The Git templates are the source of truth
              # for this deployment; runtime mutations to either file are
              # not persisted across pod restarts.
              sed -e "s|@LITELLM_BASE_URL@|${LITELLM_BASE_URL}|g" \
                  -e "s|@LITELLM_MODEL@|${LITELLM_MODEL}|g" \
                  -e "s#@LITELLM_API_KEY@#${LITELLM_API_KEY}#g" \
                  /seed/config.yaml.tpl > /opt/data/config.yaml
              echo "wrote /opt/data/config.yaml"

              # honcho.json — Honcho plugin's native config. Owned by the
              # plugin (NOT hermes-core). HERMES_PEER_NAME defaults to
              # 'default-user' if unset, so a fresh deploy without the
              # Secret key still produces a valid file.
              sed -e "s|@HERMES_PEER_NAME@|${HERMES_PEER_NAME:-default-user}|g" \
                  /seed/honcho.json.tpl > /opt/data/honcho.json
              echo "wrote /opt/data/honcho.json (peerName=${HERMES_PEER_NAME:-default-user})"

              # Normalize ownership + perms on both rendered files. Without this,
              # whoever runs the initContainer (root) leaves the files as root:root
              # 0600 — which is fine while the main container also runs as root,
              # but becomes a silent footgun the moment anything runs as the
              # hermes user (UID 10000) and falls back to default config.
              # Explicit chown/chmod keeps the contract predictable regardless of
              # who reads them.
              chown 10000:10000 /opt/data/config.yaml /opt/data/honcho.json
              chmod 0640        /opt/data/config.yaml /opt/data/honcho.json
              echo "normalized: 0640 hermes:hermes on both files"
          env:
            - name: LITELLM_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: LITELLM_BASE_URL
            - name: LITELLM_MODEL
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: LITELLM_MODEL
            - name: LITELLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: LITELLM_API_KEY
            # Honcho peer identity. Optional Secret key — fresh deployers
            # who haven't set this get peerName="default-user" in honcho.json,
            # which is a valid (if generic) starting point.
            - name: HERMES_PEER_NAME
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: HERMES_PEER_NAME
                  optional: true
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: config-tpl
              mountPath: /seed
        # stage-ssh-key — copy the host SSH key from its projected volume
        # (which fsGroup relaxes to 0440 — OpenSSH refuses) into an emptyDir
        # with explicit 0400 perms + hermes:hermes ownership. The emptyDir's
        # root dir is then group-owned by hermes, so fsGroup's OnRootMismatch
        # policy skips re-chmoding it on main-container start.
        #
        # If the Secret doesn't exist (host-access opt-in not done yet), the
        # source file is absent and we just create an empty staging dir —
        # `nuc` will fail at runtime but pod boots fine.
        - name: stage-ssh-key
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              set -e
              # chown the staging dir so fsGroup OnRootMismatch leaves it alone.
              chown 10000:10000 /stage
              chmod 0700        /stage
              if [ -f /seed-ssh/id_ed25519 ]; then
                install -m 0400 -o 10000 -g 10000 \
                  /seed-ssh/id_ed25519 /stage/id_ed25519
                echo "staged host SSH key at /stage/id_ed25519 (0400 hermes:hermes)"
              else
                echo "no host SSH key in Secret — nuc wrapper will be inert"
              fi
          volumeMounts:
            - name: host-ssh-key-src
              mountPath: /seed-ssh
              readOnly: true
            - name: host-ssh-key-staged
              mountPath: /stage
      containers:
        - name: hermes
          image: localhost/hermes-agent:v2026.5.16-voice
          imagePullPolicy: IfNotPresent
          args: ["gateway", "run"]
          ports:
            - containerPort: 8642
              name: api
            - containerPort: 9119
              name: dashboard
          env:
            - name: API_SERVER_ENABLED
              value: "true"
            - name: API_SERVER_HOST
              value: "0.0.0.0"
            - name: HERMES_DASHBOARD
              value: "1"
            - name: API_SERVER_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: API_SERVER_KEY
            # Discord gateway — only activates if the Secret has the key.
            - name: DISCORD_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: DISCORD_BOT_TOKEN
                  optional: true
            # DM allowlist — comma-separated Discord user IDs. Without this
            # the bot rejects every DM as unauthorized.
            - name: DISCORD_ALLOWED_USERS
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: DISCORD_ALLOWED_USERS
                  optional: true
            # Audio I/O — talk to PipeWire's Pulse socket on the host.
            # Host UID 1000 (apnex) runs pipewire-pulse; the socket at
            # /run/user/1000/pulse/native is world-rw, so the container
            # (running as hermes/UID 10000) can connect without a cookie.
            - name: PULSE_SERVER
              value: "unix:/run/user/1000/pulse/native"
            - name: XDG_RUNTIME_DIR
              value: "/run/user/1000"
            # Host shell — `nuc <cmd>` wrapper SSHes here as root.
            # Activates only when hermes-host-ssh-key Secret exists.
            - name: HERMES_HOST_SSH_TARGET
              value: "root@192.168.1.250"
            - name: HERMES_HOST_SSH_KEY_PATH
              value: "/etc/hermes-host-ssh/id_ed25519"
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: pulse-socket
              mountPath: /run/user/1000
            # Whole /root from the host bind-mounted at the same path
            # so file ops and ssh-execed commands see the same paths.
            - name: host-root
              mountPath: /root
            # Bot's private SSH key. Staged into an emptyDir by the
            # stage-ssh-key initContainer with explicit 0400 perms so
            # OpenSSH accepts it (fsGroup would otherwise relax the
            # projected volume to 0440).
            - name: host-ssh-key-staged
              mountPath: /etc/hermes-host-ssh
              readOnly: true
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8642
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8642
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes-data
        - name: config-tpl
          configMap:
            name: hermes-config
        # PipeWire / Pulse runtime directory from the host. Single-node
        # only — for multi-node, hermes must be pinned (nodeSelector) to
        # the node running PipeWire under UID 1000.
        - name: pulse-socket
          hostPath:
            path: /run/user/1000
            type: Directory
        # Host /root bind-mount — gives the bot direct file r/w access
        # to all the operator's projects. Single-node only.
        - name: host-root
          hostPath:
            path: /root
            type: Directory
        # SSH key for `nuc` wrapper (host-shell as root). Optional —
        # pod boots without it; nuc commands fail until the operator
        # provides HERMES_HOST_SSH_KEY via setup-host-access.sh + set-secret.
        #
        # Two-volume pattern: the projected `host-ssh-key-src` mounts the
        # raw Secret (subject to fsGroup, so it ends up 0440 — unusable);
        # the stage-ssh-key initContainer copies it into the emptyDir
        # `host-ssh-key-staged` with explicit 0400 perms that survive
        # fsGroup's OnRootMismatch policy. Main container mounts the
        # staged emptyDir, not the projected source.
        - name: host-ssh-key-src
          projected:
            defaultMode: 0400
            sources:
              - secret:
                  name: hermes-host-ssh-key
                  optional: true
                  items:
                    - key: id_ed25519
                      path: id_ed25519
                      mode: 0400
        - name: host-ssh-key-staged
          emptyDir:
            medium: Memory
