apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  namespace: hermes
  labels:
    app: hermes
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: hermes
  template:
    metadata:
      labels:
        app: hermes
    spec:
      initContainers:
        - name: seed-config
          image: nousresearch/hermes-agent:v2026.5.16
          command:
            - /bin/sh
            - -c
            - |
              # Seed config.yaml from template (first boot only)
              if [ ! -f /opt/data/config.yaml ]; then
                sed -e "s|@LITELLM_BASE_URL@|${LITELLM_BASE_URL}|g" \
                    -e "s|@LITELLM_MODEL@|${LITELLM_MODEL}|g" \
                    /seed/config.yaml.tpl > /opt/data/config.yaml
                echo "seeded /opt/data/config.yaml"
              else
                echo "config.yaml already present; leaving as-is"
              fi

              # Seed .env from .env.example if absent (preserves Hermes's defaults)
              if [ ! -f /opt/data/.env ]; then
                cp /opt/hermes/.env.example /opt/data/.env
                echo "seeded /opt/data/.env from .env.example"
              fi

              # Always inject the operator's LITELLM_API_KEY into .env
              # (overwrite if present, append otherwise). Hermes's key_env
              # lookup reads from the loaded .env, not container env.
              if grep -q '^LITELLM_API_KEY=' /opt/data/.env; then
                sed -i "s#^LITELLM_API_KEY=.*#LITELLM_API_KEY=${LITELLM_API_KEY}#" /opt/data/.env
                echo "updated LITELLM_API_KEY in /opt/data/.env"
              else
                echo "LITELLM_API_KEY=${LITELLM_API_KEY}" >> /opt/data/.env
                echo "appended LITELLM_API_KEY to /opt/data/.env"
              fi
          env:
            - name: LITELLM_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: LITELLM_BASE_URL
            - name: LITELLM_MODEL
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: LITELLM_MODEL
            - name: LITELLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: LITELLM_API_KEY
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: config-tpl
              mountPath: /seed
      containers:
        - name: hermes
          image: nousresearch/hermes-agent:v2026.5.16
          args: ["gateway", "run"]
          ports:
            - containerPort: 8642
              name: api
            - containerPort: 9119
              name: dashboard
          env:
            - name: API_SERVER_ENABLED
              value: "true"
            - name: API_SERVER_HOST
              value: "0.0.0.0"
            - name: HERMES_DASHBOARD
              value: "1"
            - name: API_SERVER_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: API_SERVER_KEY
            - name: LITELLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: LITELLM_API_KEY
          volumeMounts:
            - name: data
              mountPath: /opt/data
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8642
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8642
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes-data
        - name: config-tpl
          configMap:
            name: hermes-config
