apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  namespace: hermes
  labels:
    app: hermes
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: hermes
  template:
    metadata:
      labels:
        app: hermes
    spec:
      initContainers:
        - name: seed-config
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              # Always regenerate config.yaml from the template + Secret values.
              # The Secret is the source of truth for this deployment;
              # runtime mutations are not persisted across pod restarts.
              sed -e "s|@LITELLM_BASE_URL@|${LITELLM_BASE_URL}|g" \
                  -e "s|@LITELLM_MODEL@|${LITELLM_MODEL}|g" \
                  -e "s#@LITELLM_API_KEY@#${LITELLM_API_KEY}#g" \
                  /seed/config.yaml.tpl > /opt/data/config.yaml
              echo "wrote /opt/data/config.yaml"
          env:
            - name: LITELLM_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: LITELLM_BASE_URL
            - name: LITELLM_MODEL
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: LITELLM_MODEL
            - name: LITELLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: LITELLM_API_KEY
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: config-tpl
              mountPath: /seed
      containers:
        - name: hermes
          image: localhost/hermes-agent:v2026.5.16-voice
          imagePullPolicy: IfNotPresent
          args: ["gateway", "run"]
          ports:
            - containerPort: 8642
              name: api
            - containerPort: 9119
              name: dashboard
          env:
            - name: API_SERVER_ENABLED
              value: "true"
            - name: API_SERVER_HOST
              value: "0.0.0.0"
            - name: HERMES_DASHBOARD
              value: "1"
            - name: API_SERVER_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: API_SERVER_KEY
            # Discord gateway — only activates if the Secret has the key.
            - name: DISCORD_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: DISCORD_BOT_TOKEN
                  optional: true
            # Audio I/O — talk to PipeWire's Pulse socket on the host.
            # Host UID 1000 (apnex) runs pipewire-pulse; the socket at
            # /run/user/1000/pulse/native is world-rw, so the container
            # (running as hermes/UID 10000) can connect without a cookie.
            - name: PULSE_SERVER
              value: "unix:/run/user/1000/pulse/native"
            - name: XDG_RUNTIME_DIR
              value: "/run/user/1000"
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: pulse-socket
              mountPath: /run/user/1000
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8642
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8642
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes-data
        - name: config-tpl
          configMap:
            name: hermes-config
        # PipeWire / Pulse runtime directory from the host. Single-node
        # only — for multi-node, hermes must be pinned (nodeSelector) to
        # the node running PipeWire under UID 1000.
        - name: pulse-socket
          hostPath:
            path: /run/user/1000
            type: Directory
