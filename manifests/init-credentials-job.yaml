# In-cluster generator for API_SERVER_KEY.
#
# The hermes Deployment reads API_SERVER_KEY via secretKeyRef from the
# hermes-credentials Secret. That key is unique-per-deployment and
# generated, not retrieved — so there's no reason for it to leave the
# cluster. This Job generates it on first install (and exits 0 on every
# subsequent run since the key is already present).
#
# Runs as an Argo CD PreSync hook so the key lands in the Secret BEFORE
# the Deployment's pod tries to resolve secretKeyRef. For non-Argo
# deployments, the annotations are metadata-only no-ops — the Job runs
# concurrently with the Deployment and the kubelet retries pod creation
# until the key lands. Same end state, slightly noisier startup.
#
# Assumes hermes-credentials Secret already exists (created by set-secret
# with the operator-supplied LITELLM_API_KEY etc.). The Job patches that
# Secret to add the API_SERVER_KEY data field — does not create or
# replace it.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hermes-credentials-init
  namespace: hermes
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hermes-credentials-init
  namespace: hermes
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["hermes-credentials"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hermes-credentials-init
  namespace: hermes
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: hermes-credentials-init
subjects:
  - kind: ServiceAccount
    name: hermes-credentials-init
    namespace: hermes
---
apiVersion: batch/v1
kind: Job
metadata:
  name: hermes-credentials-init
  namespace: hermes
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: hermes-credentials-init
      restartPolicy: OnFailure
      containers:
        - name: init
          image: bitnami/kubectl:latest
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              # No-op if API_SERVER_KEY is already in the Secret (operator
              # supplied it, or a previous Job run injected it).
              EXISTING=$(kubectl -n hermes get secret hermes-credentials \
                -o jsonpath='{.data.API_SERVER_KEY}' 2>/dev/null || true)
              if [[ -n "$EXISTING" ]]; then
                echo "API_SERVER_KEY already present in hermes-credentials — no action."
                exit 0
              fi
              # Generate a 64-char alphanumeric key from /dev/urandom.
              # Equivalent strength to `openssl rand -hex 32` but avoids
              # needing openssl in the image (bitnami/kubectl ships bash +
              # standard coreutils, sufficient).
              KEY=$(tr -dc 'a-zA-Z0-9' < /dev/urandom | head -c 64)
              # Merge-patch via stringData so kubectl handles base64
              # encoding. The merge leaves every other key in the Secret
              # untouched.
              kubectl -n hermes patch secret hermes-credentials \
                --type=merge \
                -p="{\"stringData\":{\"API_SERVER_KEY\":\"$KEY\"}}"
              echo "API_SERVER_KEY generated + injected (length=${#KEY})."
