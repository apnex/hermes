# In-cluster generator for API_SERVER_KEY.
#
# The hermes Deployment reads API_SERVER_KEY via secretKeyRef from the
# hermes-credentials Secret. That key is unique-per-deployment and
# generated, not retrieved — so there's no reason for it to leave the
# cluster. This Job generates it on first install. Idempotent: on every
# subsequent run it finds the key present and exits 0.
#
# Ordering (Argo CD sync-wave):
#   wave -2: ServiceAccount + Role + RoleBinding   (RBAC first)
#   wave -1: Job                                    (after RBAC exists)
#   wave  0: everything else, including Deployment  (default — runs after
#                                                    Job completes, so the
#                                                    Deployment's secretKeyRef
#                                                    resolves on first pod create)
#
# Sync-wave annotations are no-ops outside Argo CD. For plain kubectl
# apply, k8s applies all resources, RBAC + Job + Deployment create at
# roughly the same time; the kubelet retries pod creation until the Job
# patches the Secret. Same end state, slightly noisier startup.
#
# Why NOT a PreSync hook: PreSync only applies to the Job (the resource
# carrying the hook annotation), not to the RBAC. Main-sync RBAC creation
# waits for PreSync to succeed; PreSync's Job waits for the SA that
# hasn't been created yet — deadlock. Sync-wave orders ALL resources
# within the same sync phase, no deadlock.
#
# Assumes hermes-credentials Secret already exists (created by set-secret
# with the operator-supplied LITELLM_API_KEY etc.). The Job patches that
# Secret to add the API_SERVER_KEY data field — does not create or
# replace it.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hermes-credentials-init
  namespace: hermes
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hermes-credentials-init
  namespace: hermes
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["hermes-credentials"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hermes-credentials-init
  namespace: hermes
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: hermes-credentials-init
subjects:
  - kind: ServiceAccount
    name: hermes-credentials-init
    namespace: hermes
---
apiVersion: batch/v1
kind: Job
metadata:
  name: hermes-credentials-init
  namespace: hermes
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: hermes-credentials-init
      restartPolicy: OnFailure
      containers:
        - name: init
          image: bitnami/kubectl:latest
          command:
            - /bin/bash
            - -c
            - |
              # NOTE: `set -eu` only — NOT `pipefail`. The KEY generation
              # below uses `tr | head -c N` which intentionally triggers
              # SIGPIPE on `tr` when head closes after N bytes. With
              # pipefail, that SIGPIPE (exit 141) propagates as pipeline
              # failure and set -e aborts the script before the patch runs.
              set -eu
              # No-op if API_SERVER_KEY is already in the Secret (operator
              # supplied it, or a previous Job run injected it).
              EXISTING=$(kubectl -n hermes get secret hermes-credentials \
                -o jsonpath='{.data.API_SERVER_KEY}' 2>/dev/null || true)
              if [[ -n "$EXISTING" ]]; then
                echo "API_SERVER_KEY already present in hermes-credentials — no action."
                exit 0
              fi
              # Generate a 64-char alphanumeric key from /dev/urandom.
              # Equivalent strength to `openssl rand -hex 32` but avoids
              # needing openssl in the image (bitnami/kubectl ships bash +
              # standard coreutils, sufficient).
              KEY=$(tr -dc 'a-zA-Z0-9' < /dev/urandom | head -c 64)
              # Merge-patch via stringData so kubectl handles base64
              # encoding. The merge leaves every other key in the Secret
              # untouched.
              kubectl -n hermes patch secret hermes-credentials \
                --type=merge \
                -p="{\"stringData\":{\"API_SERVER_KEY\":\"$KEY\"}}"
              echo "API_SERVER_KEY generated + injected (length=${#KEY})."
