apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: hermes

resources:
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  - serviceaccount.yaml
  - init-credentials-job.yaml

configMapGenerator:
  # hermes-templates — the two seed-config templates (config.yaml.tpl,
  # honcho.json.tpl). The seed-config initContainer mounts this as a
  # volume at /seed and renders both into /opt/data/ with placeholder
  # substitution. Distinct from `hermes-config` (the operator-supplied
  # ConfigMap with LITELLM_BASE_URL / LITELLM_MODEL / etc. — created
  # out-of-band by set-secret).
  - name: hermes-templates
    files:
      - config.yaml.tpl
      - honcho.json.tpl
  # hermes-skill-sync — script + manifest for the agent-agnostic
  # GitOps skill loader. The script clones a SKILL.md-tree repo
  # (e.g. apnex/mission-kit), resolves the wanted-bundles manifest
  # into a concrete skill list, and writes the filtered subset to
  # /opt/data/extra-skills/. See manifests/skill-sync/ for the
  # script source and the operator-editable bundle manifest.
  - name: hermes-skill-sync
    files:
      - skill-sync/skill-sync.sh
      - skill-sync/wanted-bundles.yaml
  # hermes-plugin-sync — script + manifest for the GitOps plugin loader.
  # The script clones a Hermes plugin repo (e.g. apnex/hermes-plugins),
  # resolves the wanted-plugins manifest into a concrete plugin list,
  # and writes the filtered subset to /opt/data/plugins/. Hermes's
  # memory plugin loader then auto-discovers plugins from there via
  # $HERMES_HOME/plugins/<name>/. See manifests/plugin-sync/ for the
  # script source and the operator-editable plugin manifest.
  - name: hermes-plugin-sync
    files:
      - plugin-sync/plugin-sync.sh
      - plugin-sync/wanted-plugins.yaml
