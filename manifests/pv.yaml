apiVersion: v1
kind: PersistentVolume
metadata:
  name: hermes-data-pv
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-path-static
  local:
    path: /var/lib/rancher/k3s/storage/static/hermes-data
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - obpc
  claimRef:
    apiVersion: v1
    kind: PersistentVolumeClaim
    namespace: hermes
    name: hermes-data
