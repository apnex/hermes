## ServiceAccount + ClusterRoleBinding for in-cluster K8s admin access.
##
## The pod runs as `hermes-admin`; K8s auto-mounts a bound token at
## /var/run/secrets/kubernetes.io/serviceaccount/token which kubectl
## auto-detects via in-cluster config (no kubeconfig needed).
##
## Trust posture: single-user box, treat the bot like the operator.
## Bound to cluster-admin. Narrow later by replacing the roleRef with
## a custom ClusterRole if you want a tighter blast radius.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hermes-admin
  namespace: hermes
  labels:
    app: hermes
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: hermes-admin
  labels:
    app: hermes
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: hermes-admin
    namespace: hermes
